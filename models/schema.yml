version: 2

sources:
  - name: tpch_source
    description: "Source TPC-H tables used for customer and product analytics transformations in Databricks."
    database: samples
    schema: tpch
    tables:
      - name: customer
        description: "TPC-H customer dimension table"
      - name: orders
        description: "TPC-H orders fact table"
      - name: lineitem
        description: "TPC-H line item fact table"
      - name: part
        description: "TPC-H product dimension table"

models:
  - name: customer_metrics_scd
    description: "Curated customer analytics table with SCD Type 2 history tracking."
    columns:
      - name: customer_id
        description: "Business key for the customer"
        tests:
          - not_null
      - name: customer_name
        description: "Customer name from the source table"
      - name: total_orders
        description: "Total number of orders placed by the customer"
      - name: avg_days_between_orders
        description: "Average number of days between customer orders"
      - name: lifetime_value
        description: "Total order revenue generated by the customer"
      - name: purchase_frequency
        description: "Customer purchase frequency bucket"
      - name: order_interval_bucket
        description: "Bucket based on average order interval"
      - name: valid_from
        description: "Timestamp when this record version became active"
        tests:
          - not_null
      - name: valid_to
        description: "Timestamp when this record version stopped being active"
      - name: is_current
        description: "Flag indicating whether this is the active version of the record"
        tests:
          - not_null

  - name: product_demand_scd
    description: "Curated product demand analytics table with SCD Type 2 history tracking."
    columns:
      - name: product_id
        description: "Business key for the product"
        tests:
          - not_null
      - name: product_name
        description: "Product name from the source table"
      - name: demand_count
        description: "Number of observed demand events for the product"
      - name: adi
        description: "Average Demand Interval"
      - name: avg_quantity
        description: "Average ordered quantity"
      - name: var_quantity
        description: "Variance of ordered quantity"
      - name: cv_squared
        description: "Squared coefficient of variation used in demand classification"
      - name: demand_class
        description: "Demand pattern category such as smooth, intermittent, erratic, or lumpy"
      - name: valid_from
        description: "Timestamp when this record version became active"
        tests:
          - not_null
      - name: valid_to
        description: "Timestamp when this record version stopped being active"
      - name: is_current
        description: "Flag indicating whether this is the active version of the record"
        tests:
          - not_null
